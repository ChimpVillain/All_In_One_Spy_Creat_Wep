<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>올인원 스파이 암호 생성기 (정렬+최적화)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .drag-item { transition: all 0.2s; }
    </style>
</head>
<body class="bg-slate-900 p-8 font-sans text-white relative">
    <div class="max-w-3xl mx-auto bg-slate-800 p-8 rounded-xl shadow-2xl border border-slate-700 relative">
        
        <button id="btnLogout" class="absolute top-4 right-4 bg-slate-700 hover:bg-red-500 text-xs px-3 py-1 rounded transition text-slate-300 hover:text-white border border-slate-600 hidden">
            🔌 API 키 삭제
        </button>

        <h1 class="text-3xl font-bold text-center mb-2 text-green-400 mt-4">🕵️ 스텔스 스파이 생성기</h1>
        <p class="text-center text-slate-400 mb-8">순서 정렬과 병렬 처리로 무장한 초고속 다중 변환기</p>

        <div class="mb-6 p-5 bg-slate-750 border border-slate-600 rounded-lg">
            <label class="block text-green-300 font-bold mb-2">🔑 ImgBB API 키 입력</label>
            <input type="password" id="inputApiKey" placeholder="발급받은 API 키를 붙여넣으세요" class="w-full bg-slate-800 text-white p-3 rounded-lg border border-slate-500 focus:outline-none focus:border-green-400 mb-2">
            <p id="apiKeyHint" class="text-xs text-slate-400 leading-relaxed">
                * <a href="https://api.imgbb.com/" target="_blank" class="text-blue-400 hover:text-blue-300 underline font-bold">api.imgbb.com</a> 에서 무료 발급 가능.
            </p>
        </div>

        <div class="border-2 border-dashed border-slate-600 p-6 rounded-lg text-center bg-slate-750 mb-6 hover:border-green-400 transition">
            <h2 class="text-lg font-bold text-green-300 mb-4">비밀 이미지 다중 선택</h2>
            <input type="file" id="uploadFile" multiple accept="image/png, image/jpeg, image/gif, image/webp" class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-green-600 file:text-white hover:file:bg-green-500 cursor-pointer mx-auto mb-4">
            
            <ul id="fileList" class="text-left bg-slate-800 p-2 rounded-lg hidden flex-col gap-2"></ul>
        </div>

        <button id="btnProcess" class="bg-green-600 text-white px-8 py-3 rounded-full font-bold shadow-lg hover:bg-green-500 transition w-full mb-4 text-lg">
            🚀 일괄(병렬) 초고속 변환 시작!
        </button>
        <p id="statusMsg" class="text-center text-yellow-400 font-bold hidden mb-4 animate-pulse">📡 병렬 서버 업로드 및 암호화 중...</p>

        <div id="resultSection" class="hidden flex flex-col items-center border-t border-slate-700 pt-6 mt-4">
            <div class="w-full flex justify-between items-end mb-2">
                <h3 class="font-bold text-green-400">✅ 변환 완료! (순서대로 병합됨)</h3>
            </div>
            
            <textarea id="codeResult" readonly class="w-full h-40 bg-slate-900 text-green-500 p-4 rounded-lg border border-slate-600 text-lg font-mono focus:outline-none focus:border-green-400 mb-4 resize-none leading-relaxed"></textarea>
            
            <button id="btnCopy" class="bg-green-500 text-slate-900 px-8 py-3 rounded-full font-bold shadow-lg hover:bg-green-400 transition w-full text-lg">
                📋 전체 스텔스 코드 복사
            </button>
        </div>
    </div>

    <script>
        const inputApiKey = document.getElementById('inputApiKey');
        const uploadFile = document.getElementById('uploadFile');
        const fileListUI = document.getElementById('fileList');
        const btnProcess = document.getElementById('btnProcess');
        const statusMsg = document.getElementById('statusMsg');
        const resultSection = document.getElementById('resultSection');
        const codeResult = document.getElementById('codeResult');
        const btnCopy = document.getElementById('btnCopy');
        const btnLogout = document.getElementById('btnLogout');
        const apiKeyHint = document.getElementById('apiKeyHint');

        let fileQueue = []; // 정렬 관리를 위한 파일 큐

        // API 키 관리
        function checkSavedKey() {
            const savedKey = localStorage.getItem('spy_imgbb_api_key');
            if (savedKey) {
                inputApiKey.value = savedKey;
                inputApiKey.type = "password"; 
                btnLogout.classList.remove('hidden');
                apiKeyHint.innerHTML = "<span class='text-green-400'>✅ 브라우저에 안전하게 저장된 API 키를 불러왔습니다.</span>";
            }
        }
        window.addEventListener('DOMContentLoaded', checkSavedKey);

        btnLogout.addEventListener('click', () => {
            if(confirm("저장된 API 키를 삭제하고 로그아웃 하시겠습니까?")) {
                localStorage.removeItem('spy_imgbb_api_key');
                inputApiKey.value = '';
                inputApiKey.type = "text";
                btnLogout.classList.add('hidden');
                resultSection.classList.add('hidden');
                apiKeyHint.innerHTML = `* <a href="https://api.imgbb.com/" target="_blank" class="text-blue-400 hover:text-blue-300 underline font-bold">api.imgbb.com</a> 에서 무료 발급 가능.`;
            }
        });

        // 🌟 순서 정렬 기능 로직
        function renderFileList() {
            fileListUI.innerHTML = '';
            if (fileQueue.length === 0) {
                fileListUI.classList.add('hidden');
                return;
            }
            fileListUI.classList.remove('hidden');

            fileQueue.forEach((fileObj, index) => {
                const li = document.createElement('li');
                li.className = "flex justify-between items-center bg-slate-700 p-2 rounded drag-item text-sm";
                
                const nameSpan = document.createElement('span');
                nameSpan.className = "truncate w-3/5 text-slate-300";
                nameSpan.innerText = `${index + 1}. ${fileObj.file.name}`;

                const btnGroup = document.createElement('div');
                btnGroup.className = "flex gap-1";

                const btnUp = document.createElement('button');
                btnUp.innerText = '🔼';
                btnUp.className = "p-1 hover:bg-slate-600 rounded";
                btnUp.disabled = index === 0;
                btnUp.onclick = () => moveItem(index, -1);

                const btnDown = document.createElement('button');
                btnDown.innerText = '🔽';
                btnDown.className = "p-1 hover:bg-slate-600 rounded";
                btnDown.disabled = index === fileQueue.length - 1;
                btnDown.onclick = () => moveItem(index, 1);

                const btnDel = document.createElement('button');
                btnDel.innerText = '❌';
                btnDel.className = "p-1 hover:bg-red-500 rounded ml-2";
                btnDel.onclick = () => { fileQueue.splice(index, 1); renderFileList(); };

                btnGroup.append(btnUp, btnDown, btnDel);
                li.append(nameSpan, btnGroup);
                fileListUI.appendChild(li);
            });
        }

        function moveItem(index, direction) {
            const temp = fileQueue[index];
            fileQueue[index] = fileQueue[index + direction];
            fileQueue[index + direction] = temp;
            renderFileList();
        }

        uploadFile.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(f => fileQueue.push({ file: f }));
            uploadFile.value = ''; // 입력창 초기화 (중복 추가 가능하게)
            renderFileList();
        });

        // 🌟 병렬(Concurrent) 업로드 처리 함수
        async function uploadAndEncode(file, apiKey) {
            const formData = new FormData();
            formData.append('image', file);
            
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            
            if (!data.success) throw new Error(data.error?.message || "업로드 실패");
            
            const imageUrl = data.data.url; 
            const base64Url = btoa(imageUrl); 
            const reversedCode = base64Url.split('').reverse().join(''); 
            return `[#${reversedCode}#]`;
        }

        btnProcess.addEventListener('click', async () => {
            const apiKey = inputApiKey.value.trim();
            if (!apiKey) return alert("API 키를 입력해주세요!");
            if (fileQueue.length === 0) return alert("이미지를 추가해주세요!");

            localStorage.setItem('spy_imgbb_api_key', apiKey);
            checkSavedKey();

            btnProcess.disabled = true;
            btnProcess.classList.add('opacity-50', 'cursor-not-allowed');
            statusMsg.classList.remove('hidden');
            resultSection.classList.add('hidden');

            try {
                // 🌟 속도 최적화: Promise.all을 사용한 병렬 업로드! (한방에 쫙 올림)
                const uploadPromises = fileQueue.map(obj => uploadAndEncode(obj.file, apiKey));
                const results = await Promise.all(uploadPromises);
                
                const combinedCodes = results.join("\n\n");
                codeResult.value = combinedCodes.trim();
                
                statusMsg.classList.add('hidden');
                resultSection.classList.remove('hidden');
            } catch (error) {
                alert("❌ 오류 발생: " + error.message);
                statusMsg.classList.add('hidden');
            } finally {
                btnProcess.disabled = false;
                btnProcess.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });

        btnCopy.addEventListener('click', () => {
            codeResult.select();
            document.execCommand('copy');
            btnCopy.innerText = `복사 완료! (${fileQueue.length}장) ✔️`;
            btnCopy.classList.replace('bg-green-500', 'bg-blue-500');
            setTimeout(() => {
                btnCopy.innerText = "📋 전체 스텔스 코드 복사";
                btnCopy.classList.replace('bg-blue-500', 'bg-green-500');
            }, 3000);
        });
    </script>
</body>
</html>
